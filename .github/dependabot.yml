version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    reviewers:
      - gek0z
    commit-message:
      prefix: "chore(deps):"
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    reviewers:
      - gek0z
    commit-message:
      prefix: "chore(ci):"
    groups:
      actions:
        patterns: ["*"]
