version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    # Published library: the default widen_ranges strategy only edits
    # package.json when latest falls outside the declared range, so in-range
    # caret bumps yield no PR. "increase" bumps the declared range itself
    # (e.g. ^2.4.10 -> ^2.4.15). bun.lock is refreshed by dependabot-lockfile.yml.
    versioning-strategy: increase
    commit-message:
      prefix: "chore(deps):"
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "chore(ci):"
    groups:
      actions:
        patterns: ["*"]
