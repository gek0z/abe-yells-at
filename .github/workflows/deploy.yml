name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/core/src/**"
      - "packages/core/frames/**"
      - "bun.lock"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun test --cwd packages/core

      - run: bun run --cwd packages/core build

      - run: bun run --cwd apps/web build
        env:
          VITE_LOGO_DEV_TOKEN: ${{ secrets.VITE_LOGO_DEV_TOKEN }}
          VITE_GTM_ID: ${{ secrets.VITE_GTM_ID }}

      # Wrangler v4 requires Node >= 22 (bun's node-compat reports v20.x and is
      # rejected). wrangler-action installs wrangler into the repo, but npm can't
      # resolve bun's `workspace:*` deps (EUNSUPPORTEDPROTOCOL). So install
      # wrangler globally under real Node 22 and invoke it directly.
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install -g wrangler@4

      - run: wrangler pages deploy apps/web/dist --project-name=abe-yells-at
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for deploy propagation
        run: sleep 30

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
