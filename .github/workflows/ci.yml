name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - .gitignore
      - LICENSE
      - .changeset/**
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

jobs:
  lint:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx biome ci .

  typecheck:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsgo --noEmit -p packages/core/tsconfig.json
      - run: bun run --cwd packages/core build
      - run: bunx tsgo --noEmit -p apps/web/tsconfig.json

  test:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test --cwd packages/core

  build:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-ci')
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/core build
      - run: bun run --cwd apps/web build
        env:
          VITE_LOGO_DEV_TOKEN: ${{ secrets.VITE_LOGO_DEV_TOKEN }}

  ci:
    if: always()
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    steps:
      - run: |
          results="${{ needs.lint.result }} ${{ needs.typecheck.result }} ${{ needs.test.result }} ${{ needs.build.result }}"
          for r in $results; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "CI failed: $results"
              exit 1
            fi
          done
          echo "CI passed: $results"
