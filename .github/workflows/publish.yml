name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/core/**"
      - ".changeset/**"
  # Allow manual runs (e.g. to publish a version already bumped on main when a
  # prior publish run failed). changeset publish only publishes versions newer
  # than what's on npm, so re-running is safe.
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      # Node 24 bundles npm >= 11.5.1, required for OIDC trusted publishing.
      # (Node 22 ships npm 10.x; upgrading npm in place is fragile, so use 24.)
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - run: bun test --cwd packages/core

      - run: bun run --cwd packages/core build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          # No NODE_AUTH_TOKEN: auth comes from OIDC trusted publishing
          # (configured for this repo + publish.yml on npmjs.com). npm also
          # attaches provenance automatically when publishing via OIDC.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
