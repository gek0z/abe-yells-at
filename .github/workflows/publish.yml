name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/core/**"
      - ".changeset/**"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10.x.
      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - run: bun test --cwd packages/core

      - run: bun run --cwd packages/core build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          # No NODE_AUTH_TOKEN: auth comes from OIDC trusted publishing
          # (configured for this repo + publish.yml on npmjs.com). npm also
          # attaches provenance automatically when publishing via OIDC.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
